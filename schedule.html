<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Расписание занятий | ИМПЕРИЯ ТАНЦА</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23d946ef%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7Z%22/><path d=%22M5 20h14%22/></svg>">
    
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://api.allorigins.win">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      :root { --base: #0f051a; --textSoft: #cab6db; --neon: #d946ef; }
      body { background: var(--base); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
      .bg-orb { position: fixed; width: 40rem; height: 40rem; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: -1; pointer-events: none; }
      .bg-orb-1 { top: -10rem; left: -10rem; background: rgba(217, 70, 239, 0.4); }
      .bg-orb-2 { bottom: -10rem; right: -10rem; background: rgba(124, 58, 237, 0.4); }
      .card-surface { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; backdrop-filter: blur(10px); }
      .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { base: "#0f051a", textSoft: "#cab6db", neon: "#d946ef" },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-base text-white">
    <div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-noise"></div>
    
    <header class="sticky top-0 z-50 border-b border-white/10 bg-base/80 backdrop-blur-md">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
        <a href="index.html" class="flex items-center text-sm font-bold tracking-[0.14em]">
          <svg class="mr-3 h-7 w-7 text-neon drop-shadow-[0_0_8px_rgba(217,70,239,0.6)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7Z"/>
            <path d="M5 20h14"/>
          </svg>
          <span class="text-white">ИМПЕРИЯ ТАНЦА</span>
        </a>
        <nav class="hidden items-center gap-5 text-sm md:flex">
          <a href="index.html" class="nav-link">Главная</a>
          <a href="directions.html" class="nav-link">Направления</a>
          <a href="trainers.html" class="nav-link">Тренеры</a>
          <a href="schedule.html" class="nav-link">Расписание</a>
          <a href="prices.html" class="nav-link">Цены</a>
          <a href="contacts.html" class="nav-link">Контакты</a>
        </nav>
      </div>
    </header>

    <main class="relative z-10 mx-auto max-w-7xl px-4 pb-12 pt-8">
      <h1 class="text-3xl font-black md:text-5xl">Расписание занятий</h1>
      
      <section class="mt-8 card-surface p-3 md:p-5">
        <div class="mb-4 flex flex-wrap items-center gap-2 text-xs text-textSoft">
          <span class="rounded-full border border-white/20 px-3 py-1">Кальварийская, 25</span>
          <span class="rounded-full border border-white/20 px-3 py-1">Запись обязательна</span>
          <span class="rounded-full border border-white/20 px-3 py-1">11:00–23:00</span>
        </div>
        <div class="overflow-auto rounded-xl border border-white/10 relative max-h-[85vh]">
          <div id="loadingOverlay" class="absolute inset-0 z-30 flex items-center justify-center bg-base/60 backdrop-blur-sm transition-opacity duration-300">
            <div class="flex flex-col items-center gap-3">
              <div class="h-10 w-10 animate-spin rounded-full border-4 border-neon border-t-transparent"></div>
              <p class="text-sm font-medium text-textSoft">Загрузка...</p>
            </div>
          </div>
          <table class="w-full border-collapse text-sm">
            <thead class="sticky top-0 z-30 bg-base shadow-md">
              <tr class="bg-white/5 text-left">
                <th class="p-2 md:p-3 font-semibold sticky left-0 top-0 bg-base z-40 border-r border-white/10">Время</th>
                <th class="p-2 md:p-3 font-semibold text-center">Пн</th>
                <th class="p-2 md:p-3 font-semibold text-center">Вт</th>
                <th class="p-2 md:p-3 font-semibold text-center">Ср</th>
                <th class="p-2 md:p-3 font-semibold text-center">Чт</th>
                <th class="p-2 md:p-3 font-semibold text-center">Пт</th>
                <th class="p-2 md:p-3 font-semibold text-center">Сб</th>
              </tr>
            </thead>
            <tbody id="scheduleBody" class="divide-y divide-white/10">
              <!-- Данные будут загружены динамически -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="schedule.js" defer></script>
  </body>
</html>
